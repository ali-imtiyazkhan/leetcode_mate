<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      background: #0f0f1a;
      color: #e2e2f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 4px;
      letter-spacing: 0.04em;
    }
    .tagline {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 14px;
    }
    .section {
      background: #1a1a2a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .stat-val {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
    }
    .stat-label { font-size: 12px; color: #9ca3af; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 5px;
    }
    .status-dot.offline { background: #4b5563; }
    .link {
      color: #7c3aed;
      text-decoration: none;
      font-size: 12px;
    }
    .link:hover { text-decoration: underline; }
    .footer {
      text-align: center;
      font-size: 10px;
      color: #374151;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="logo">CodeMate</div>
  <div class="tagline">Solve DSA with others — live</div>

  <div class="section">
    <div class="section-title">Server status</div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="status-dot" id="srv-dot"></span>
      <span id="srv-status" style="font-size:12px;color:#9ca3af;">Checking...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Right now</div>
    <div class="stat-row">
      <span class="stat-label">Total online</span>
      <span class="stat-val" id="total-online">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Active rooms</span>
      <span class="stat-val" id="active-rooms">--</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">How to use</div>
    <ol style="padding-left:14px;color:#9ca3af;font-size:12px;line-height:1.7;">
      <li>Go to any <a class="link" href="https://leetcode.com/problems/" target="_blank">LeetCode problem</a></li>
      <li>Watch the live count appear</li>
      <li>Click <strong style="color:#a78bfa">Find a partner</strong></li>
      <li>Chat or work together!</li>
    </ol>
  </div>

  <div class="footer">CodeMate v0.1 · Open source</div>

  <script type="module" src="src/popup.ts"></script>
</body>
</html>
