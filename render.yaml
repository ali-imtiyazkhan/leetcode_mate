services:
  - type: web
    name: codemate-server
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: REDIS_HOST
        fromService:
          type: redis
          name: codemate-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: codemate-redis
          property: port
      - key: CLIENT_ORIGIN
        value: https://your-frontend-url.vercel.app
    dockerContext: .
    dockerfilePath: render.Dockerfile

  - type: redis
    name: codemate-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (Render internal)
