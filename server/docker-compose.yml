
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  server:
    build: .
    ports:
      - '4000:4000'
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=4000
      - CLIENT_ORIGIN=http://localhost:3000
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  redis_data:
